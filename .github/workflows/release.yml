name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Windows amd64
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o barryallen-windows-amd64.exe .

      - name: Build Windows arm64
        env:
          GOOS: windows
          GOARCH: arm64
        run: go build -ldflags="-s -w" -o barryallen-windows-arm64.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            barryallen-windows-amd64.exe
            barryallen-windows-arm64.exe
